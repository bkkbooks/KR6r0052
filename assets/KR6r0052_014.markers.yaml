  - {type: variant, offset: 4798, length: 118, content: '此傳是會稽嘉祥寺＋（釋）【三】＊寺【大】＊，寺釋【宋】＊【元】＊【明】＊寺寺釋慧皎法師所撰。法師學通內外，善講＝精研【三】善講【大】，精研【宋】【元】【明】善講精研經律，著《涅槃疏》十卷、《梵網戒》等義疏，並為世軌。又著＝撰【三】著【大】，撰【宋】【元】【明】著撰此《高僧傳＋（及序共）【三】傳【大】，傳及序共【宋】【元】【明】傳傳及序共》十三＝四【三】三【大】，四【宋】【元】【明】三四卷。梁末承聖二年，太歲癸酉，避侯景難，來至湓城，少時講說。甲戌年＝歲【三】年【大】，歲【宋】【元】【明】年歲二月捨化，時年＝春秋【三】時年【大】，春秋【宋】【元】【明】時年春秋五十有八。江州僧正慧恭＋（為首）【三】恭【大】，恭為首【宋】【元】【明】恭恭為首經，始＝營【三】始【大】，營【宋】【元】【明】始營葬＋（于）【三】葬【大】，葬于【宋】【元】【明】葬葬于

      廬山禪閣寺墓＋（時）【三】墓【大】，墓時【宋】【元】【明】墓墓時。龍光寺寺釋僧果同避難在山，遇見時事，聊記之云爾＝耳【三】爾【大】，耳【宋】【元】【明】爾耳。', 宮: '', 宋: 右此傳是會稽嘉祥寺慧皎法師所撰法師學通內外善講經律著涅槃疏十卷梵網戒等義疏並為世軌又著此高僧傳十三卷梁末承聖二年太歲癸酉避侯景難來至湓城少時講說甲戌年二月捨化時年五十有八江州僧正慧恭經始葬廬山禪閣寺墓龍光寺僧果同避難在山遇見時事聊記之云爾, 元: 右此傳是會稽嘉祥寺慧皎法師所撰法師學通內外善講經律著涅槃疏十卷梵網戒等義疏並為世軌又著此高僧傳十三卷梁末承聖二年太歲癸酉避侯景難來至湓城少時講說甲戌年二月捨化時年五十有八江州僧正慧恭經始葬廬山禪閣寺墓龍光寺僧果同避難在山遇見時事聊記之云爾, 明: 右此傳是會稽嘉祥寺慧皎法師所撰法師學通內外善講經律著涅槃疏十卷梵網戒等義疏並為世軌又著此高僧傳十三卷梁末承聖二年太歲癸酉避侯景難來至湓城少時講說甲戌年二月捨化時年五十有八江州僧正慧恭經始葬廬山禪閣寺墓龍光寺僧果同避難在山遇見時事聊記之云爾}
