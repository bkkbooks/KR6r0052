body:
  text: 梁會稽嘉祥寺沙門釋慧皎撰原夫至道沖漠假蹄筌而後彰玄致幽凝藉師保以成用是由聖迹迭興賢能異託辨忠烈孝慈以定君敬之道明詩書禮樂以成風俗之訓或忘功遺事尚彼虛沖或體任榮枯重茲達命而皆教但域中功存近益斯蓋漸染之方未奧盡其神性至若能仁之為訓也考業果幽微則循復三世言至理高妙則貫絶百靈若夫啓十地以辨慧宗顯二諦以詮智府窮神盡性之旨管一樞極之致餘教方之猶群流之歸巨衆星之共北辰悠哉邈矣信難得以言尚至乃教滿三千形遍六道皆所以接引幽昏為大利益而以淨穢異聞升墜殊見故秋方先音形之本東國後見聞之益雲龍表於夜明風虎彰乎宵夢鴻風既扇大化斯融自爾西域名僧往往而至或傳度經法或教授禪道或以異迹化人或以神力救物自漢之梁紀曆彌遠世涉六代年將五百此土桑門含章秀起群英間出迭有其人衆家記録敘載各異沙門法濟偏敘高逸一迹沙門法安但列志節一行沙門僧寶止命遊方一科沙門法進乃通撰傳論而辭事闕略並皆互有繁簡出沒成異考之行事未見其歸宋臨川康王義慶宣驗記及幽明録太原王琰冥祥記彭城劉悛益部寺記沙門曇宗京師寺記太原王延秀感應傳朱君台徵應傳陶淵明搜神録並傍出諸僧敘其風素而皆是附見亟多疏闕齊竟陵文宣王三寶記傳或稱佛史或號僧録既三寶共敘辭旨相關混濫難求更為蕪昧琅瑘王巾所撰僧史意似該綜而文體未足沙門僧祐撰三藏記止有三十餘僧所無甚衆中書郎郤景興東山僧傳治中張孝秀廬山僧傳中書陸明霞沙門傳各競舉一方不通今古務存一善不及餘行逮乎即時亦繼有作者然或褒贊之下過相揄揚或敘事之中空列辭費求之實理無的可稱或復嫌以繁廣刪減其事而抗迹之奇多所遺削謂出家之士處國賓王不應勵然自遠高蹈獨絶尋辭榮棄愛本以異俗為賢若此而不論竟何所紀嘗以暇日遇覽群作輒搜撿雜録數十餘家及晉宋齊梁春秋書史秦趙燕涼荒朝僞曆地理雜篇孤文片記并博咨古老廣訪先達校其有無取其同異始于漢明帝永平十年終至梁天監十八年凡四百五十三載二百五十七人又傍出附見者二百餘人開其德業大為十例一曰譯經二曰義解三曰神異四曰習禪五曰明律六曰遺身七曰誦經八曰興福九曰經師十曰唱導然法流東土蓋由傳譯之勳或踰越沙險或泛漾洪波皆忘形殉道委命弘法震旦開明一焉是賴茲德可崇故列之篇首至若慧解開神則道兼萬億通感適化則彊暴以綏靖念安禪則功德森茂弘贊毗尼則禁行清潔忘形遺體則矜吝革心歌誦法言則幽顯含慶樹興福善則遺像可傳凡此八科並以軌迹不同化洽殊異而皆德效四依功在三業故為群經之所稱美衆聖之所褒述及夫討核源流商榷取捨皆列諸贊論備之後文而論所著辭微異恆體始標大意類猶前序未辨時人事同後議若間施前後如謂煩雜故總布一科之末通稱為論其轉讀宣唱雖源出非遠然而應機悟俗實有偏功故齊宋雜記咸條列秀者今之所取必其製用超絶及有一分通感乃編之傳末如或異者非所存焉凡十科所敘皆散在衆記今止刪聚一處故述而無作俾夫披覽於一本之內可兼諸要其有繁辭虛贊或德不及稱者一皆省略故述六代賢異止為十三卷并序録合十四軸號曰高僧傳自前代所撰多曰名僧然名者本實之賓也若實行潛光則高而不名寡德適時則名而不高名而不高本非所紀高而不名則備今録故省名音代以高字其間草創或有遺逸今此一十四卷備贊論者意以為定如未隱括覽者詳焉高僧傳第一卷譯經上十五人漢雒陽白馬寺攝摩騰漢雒陽白馬寺竺法蘭漢雒陽安清漢雒陽支樓迦讖竺佛朔安玄嚴佛調支曜康巨康孟詳魏雒陽曇柯迦羅康僧鎧曇帝帛延魏吳建業建初寺康僧會魏吳武昌維祇難法立法巨晉長安竺曇摩羅剎聶承遠聶道真晉長安帛遠帛法祚衛士度晉建康建初寺帛尸梨蜜晉長安僧伽跋澄佛圖羅剎晉長安曇摩難提趙政晉廬山僧伽提婆僧伽羅叉晉長安竺佛念晉江陵辛寺曇摩耶舍竺法度高僧傳第二卷譯經中七人晉長安鳩摩羅什晉長安弗若多羅晉長安曇摩流支晉壽春石澗寺卑摩羅叉晉長安佛陀耶舍晉京師道場寺佛馱跋陀羅晉河西曇無讖安陽矦道普法盛法維僧表高僧傳第三卷譯經下十三人宋江陵辛寺釋法顯宋黃龍釋曇無竭宋建康龍光寺佛馱什宋河西浮陀跋摩宋京師枳園寺釋智嚴宋六合山釋寶雲宋京師祇洹寺求那跋摩宋京師奉誠寺僧伽跋摩宋上定林寺曇摩蜜多宋京兆釋智猛宋京師道林寺疆良耶舍僧伽達多僧伽羅多哆宋京師中興寺求那跋陀羅阿那摩低齊建康正觀寺求那毗地僧伽婆羅高僧傳第四卷義解一十四人晉洛陽朱士行竺叔蘭無羅叉晉淮陽支孝龍晉豫章山康僧淵康法暢支敏度晉高邑竺法雅毗浮曇相曇習晉中山康法朗令韶晉燉煌竺法乘竺法行竺法存晉剡東仰山竺法潛竺法友竺法蘊竺法濟康法讖晉剡沃洲山支遁支法度竺法仰晉剡山于法蘭竺法興支法淵于法道晉剡白山于法開于法威晉燉煌于道邃晉剡葛峴山竺法崇道寶晉始寧山竺法義晉東莞竺僧度竺慧超高僧傳第五卷義解二十五人晉長安五級寺釋道安王嘉晉蒱坂釋法和晉泰山崑崙巖竺僧朗支僧敦晉京師瓦官寺竺法汰曇一曇二晉飛龍山釋僧先道護晉荊州上明竺僧輔晉京師瓦官寺竺僧敷晉荊州長沙寺釋曇翼僧衛晉荊州長沙寺釋法遇晉荊州上明釋曇徽晉長安覆舟山釋道立僧常法濬晉長沙寺釋曇誡晉於替青山竺法曠晉吳虎丘東寺竺道一帛道猷道寶道施晉山陰嘉祥寺釋慧虔曇誡智明高僧傳第六卷義解三十三人晉