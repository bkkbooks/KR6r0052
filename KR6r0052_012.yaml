body:
  text: 梁會稽嘉祥寺沙門釋慧皎撰亡身第六釋僧群一釋曇稱二釋法進三釋僧富四釋法羽五釋慧紹六釋僧瑜七釋慧益八釋僧慶九釋法光十釋曇弘十一釋僧群未詳何許人清貧守節蔬食誦經後遷居羅江縣之霍山構立茅室山孤在海中上有石盂徑數丈許水深六七尺常有清流古老相傳云是群仙所宅群飲水不飢因絶粒後晉安太守陶夔聞而索之群以水遺夔出山輒臭如此三四夔躬自越海天甚晴霽及至山風雨晦暝停數日竟不得至乃歎曰俗內凡夫遂為賢聖所隔慨恨而返群庵舍與盂隔一小澗常以一木為梁由之汲水後時忽有一折翅鴨舒翼當梁頭就唼群群欲舉錫杖撥之恐畏傷損因此回還絶水不飲數日而終春秋一百四十矣臨終向人説年少時經折一鴨翅驗此以為現報釋曇稱河北人少而仁愛惠及昆蟲晉末至彭城見有老人年八十夫妻窮悴乃捨戒為奴纍年執役而內修道德未嘗有廢鄉鄰嗟之及二老卒傭賃獲直悉為二老福用擬以自贖事畢欲還入道法物未備宋初彭城駕山下虎災村人遇害日有一兩稱乃謂村人曰虎若食我災必當消村人苦諫不從即於是夜獨坐草中呪願曰以我此身充汝飢渴令汝從今息怨害意未來當得無上法食村人知其意正各泣拜而還至四更中聞虎取稱村人逐至南山噉身都盡唯有頭在因葬而起塔爾後虎災遂息釋法進或曰道進或曰法迎姓唐涼州張掖人幼而精苦習誦有超邁之德為沮渠蒙遜所重遜卒子景環為胡寇所破問進曰今欲轉略高昌為可剋不進曰必捷但憂災餓耳回軍即定後三年景環卒弟安周續立是歲飢荒死者無限周既事進進屢從求乞以賑貧餓國蓄稍竭進不復求乃淨洗浴取刀鹽至深窮窟餓人所聚之處次第授以三歸便挂衣鉢著樹投身餓者前云施汝共食衆雖飢困猶義不忍受進即自割肉和鹽以啖之兩股肉盡心悶不能自割因語餓人云汝取我皮肉猶足數日若王使來必當將去但取藏之餓者悲悼無能取者須臾弟子來至王人復看舉國奔赴號叫相屬因輿之還宮周敕以三百斛麥以施餓者別發倉廩以賑貧民至明晨乃絶出城北闍維之煙炎衝天七日乃歇尸骸都盡唯舌不爛即於其處起塔三層樹碑于右進弟子僧遵姓趙高昌人善十誦律蔬食節行誦法華勝鬘金剛波若又篤厲門人常懺悔為業釋僧富姓山高陽人父霸為藍田令富少孤居貧而篤學無厭採薪為燭以照讀書及至冠年備盡經史美姿容善談論後遇偽秦衛將軍楊雍資其衣糧習鑿齒携共志學及聽安公講放光經遂有心樂道於是剃髮依安受業安亡後還魏郡廷尉寺下帷潛思絶事人間時村中有劫劫得一小兒欲取心肝以解神富逍遙路口遇見劫具問其意因脫衣以易小兒群劫不許富曰大人五藏亦可用不劫謂富不能亡身妄言亦好富乃念曰我幻炎之軀會有一死以死濟人雖死猶生即自取劫刀劃胸至臍群劫更相咎責四散奔走即送小兒還家路口時行路一人見富如此因問其故富雖復頓悶口猶能言乃具答以事此人悲悼傷心還家取針縫其腹皮塗以驗藥輿還寺將息少時而差後不知所終釋法羽冀州人十五出家為慧始弟子始立行精苦修頭陀之業羽操心勇猛深達其道常欲仰軌藥王燒身供養時偽晉王姚緒鎮蒱坂羽以事白緒緒曰入道多方何必燒身不敢固違幸願三思羽誓志既重即服香屑以布纏體誦捨身品竟以火自燎道俗觀視莫不悲慕焉時年四十有五釋慧紹不知氏族小兒時母哺魚肉輒吐咽菜不疑於是便蔬食至八歲出家為僧要弟子精勤懍勵苦行標節後隨要止臨川招提寺乃密有燒身之意常雇人斫薪𧂐於東山石室高數丈中央開一龕足容己身乃還寺辭要要苦諫不從即於焚身之日於東山設大衆八關并告別知識其日闔境奔波車馬人衆及齎金寶者不可稱數至初夜行道紹自行香行香既竟執燭然薪入中而坐誦藥王本事品衆既不見紹悟其已去禮拜未畢悉至薪所𧂐已洞然誦聲未息火至額聞唱一心言已奄絶大衆咸見有一星其大如斗直下煙中俄而上天時見者咸謂天宮迎紹經三日薪聚乃盡紹臨終謂同學曰吾燒身處當生梧桐慎莫伐之其後三日果生焉紹焚身是元嘉二十八年年二十八紹師僧要亦清謹有懿德年一百六十終於寺矣釋僧瑜姓周吳興餘杭人弱冠出家業素純粹元嘉十五年與同學曇溫慧光等於廬山南嶺共建精舍名曰招隱瑜常以為結纍三塗情形故也情將盡矣形亦宜損藥王之𨅊獨何云遠於是屢發言誓始契燒身以宋孝建二年六月三日集薪為龕并請僧設齋告衆辭別是日雲霧晦合密雨交零瑜乃誓曰若我所志克明天當清朗如其無感便當滂注使此四輩知神應之無昧也言已雲景明霽至初夜竟便入薪龕中合掌平坐誦藥王品火焰交至猶合掌不散道俗知者奔赴彌山並稽首作禮願結因緣咸見紫氣騰空久之乃歇時年四十四其後旬有四日瑜房中生雙梧桐根枝豐茂巨細相如貫壤直聳遂成奇樹理識者以為娑羅寶樹剋炳泥洹瑜之庶幾故現斯證因號為雙桐沙門吳郡張辨為平南長史親覩其事具為傳贊贊曰悠悠玄機茫茫至道出生入死孰為妙寶其一自昔藥王殊化絶倫往聞其説今覩斯人其二英英沙門慧定心固凝神紫氣表迹雙樹其三其德可樂其操可貴文之作矣式飄髣佛其四釋慧益廣陵人少出家隨師止壽春宋孝建中出都憩竹林寺精勤苦行誓欲燒身衆人聞者或毀或讚至大明四年始就却粒唯餌麻麥到六年又絶麥等但食蘇油有頃又斷蘇油唯服香丸雖四大綿微而神情警正孝武深加敬異致問殷勤遣太宰江夏王義恭詣寺諫益益誓志無改至大明七年四月八日將就焚燒乃於鍾山之南置鑊辦油其日朝乘牛車而以人牽自寺之山以帝王是兆民所憑又三寶所寄乃自力入臺至雲龍門不能步下令人啓聞慧益道人今捨身詣門奉辭深以佛法仰纍帝聞改容即躬出雲龍門益既見帝重以佛法憑囑於是辭去帝亦續至諸王妃后道俗士庶填滿山谷投衣棄寶不可勝計益乃入鑊據一小床以衣具自纏上加一長帽以油灌之將就著火帝令太宰至鑊所請喻曰道行多方何必殞命幸願三思更就異途益雅志確然曾無悔念乃答曰微軀賤命何足上留天心聖慈罔已者願度二十人出家降敕即許益乃手自執燭以然帽帽然乃棄燭合掌誦藥王品火至眉誦聲猶分明及眼乃昧貴賤哀嗟響振幽谷莫不彈指稱佛惆悵淚下火至明旦乃盡帝於時聞空中笳管異香芬苾帝盡日方還宮夜夢見益振錫而至更囑以佛法明日帝為設會度人令齋主唱白具序徵祥燒身之處謂藥王寺以擬本事也釋僧慶姓陳巴西安漢人家世事五斗米道慶生而獨悟十三出家止義興寺淨修梵行願求見佛先捨三指末誓燒身漸絶糧粒唯服香油到大明三年二月八日於蜀城武擔寺西對其所造淨名像前焚身供養刺史張悅躬出臨視道俗僑舊觀者傾邑行雲為結苦雨悲零俄而晴景開明天色澄淨見一物如龍從𧂐升天時年二十三天水太守裴方明為收灰起塔釋法光秦州隴西人少而有信至二十九方出家苦行頭陀不服綿纊絶五穀唯餌松葉後誓志燒身乃服松膏及飲油經于半年至齊永明五年十月二十日於隴西記城寺內集薪焚身以滿先志火來至目誦聲猶記至鼻乃昧奄然而絶春秋四十有一時永明末始豐縣有比丘法存亦燒身供養郡守蕭緬遣沙門慧深為起灰塔釋曇弘黃龍人少修戒行專精律部宋永初中南遊番禺止臺寺晚又適交趾之仙山寺誦無量壽及觀經誓心安養以孝建二年於山上聚薪密往𧂐中以火自燒弟子追及抱持將還半身已爛經月小差後近村設會舉寺皆赴弘於是日復入谷燒身村人追求命已絶矣於是益薪進火明日乃盡爾日村居民咸見弘身黃金色乘一金鹿西行甚急不暇暄涼道俗方悟其神異共收灰骨以起塔焉論曰夫有形之所貴者身也情識之所珍者命也是故餐脂飲血乘肥衣輕欲其怡懌也餌朮含丹防生養性欲其壽考也至如析一毛以利天下則吝而弗為徹一餐以續餘命則惜而不與此其弊過矣自有宏知達見遺己贍人體三界為長夜之宅悟四生為夢幻之境精神逸乎蜚羽形骸滯於瓶穀是故摩頂至足曾不介心國城妻子捨若草芥今之所論蓋其人也僧群心為一鴨而絶水以亡身僧富止救一童而劃腹以全命法進割肉以啖人曇稱自餧於災虎斯皆尚乎兼濟之道忘我利物者也昔王子投身功踰九劫刳肌貿鳥駭震三千惟夫若人固以超邁高絶矣爰次法羽至于曇弘皆灰燼形骸棄捨珍愛或以情祈安養或以願生知足故雙梧表於房裏一館顯自空中符瑞彪炳與時間出然聖教不同開遮亦異若是大權為物適時而動利現萬端非教所制故經云能然手足一指乃勝國城布施若是出家凡僧本以威儀攝物而今殘毀形骸壞福田相考而為談有得有失得在忘身失在違戒故龍樹云新行菩薩不能一時備行諸度或滿檀而乖孝如王子投虎或滿慧而乖慈如檢他斷食等皆由行未全美不無盈缺又佛説身有八萬戶蟲與人同氣人命既盡蟲亦俱逝是故羅漢死後佛許燒身而今未死便燒或於蟲命有失説者或言羅漢尚入火光夫復何怪有言入火光者先已捨命用神智力後乃自燒然性地菩薩亦未免報軀或時投形火聚或時裂骸分人當知殺蟲之論其究竟詳焉夫三毒四倒乃生死之根栽七覺八道實涅槃之要路豈必燔炙形骸然後離苦若其位鄰得忍俯迹同凡或時為物捨身此非言論所及至如凡夫之徒鑒察無廣竟不知盡壽行道何如棄捨身命或欲邀譽一時或欲流名萬代及臨火就薪悔怖交切彰言既廣恥奪其操於是僶俯從事空嬰萬苦若然非所謂也贊曰若人挺志金石非英鑠茲所重祈彼寶城芬梧蓊蔚紫館浮輕騰煙曜彩吐瑞含禎千秋尚美萬代傳馨誦經第七二十一人釋曇邃一釋法相二竺法純三釋僧生四釋法宗五釋道冏六釋慧慶七釋普明八釋法莊九釋慧果十釋法恭十一釋僧覆十二釋慧進十三釋弘明十四釋慧豫十五釋道嵩十六釋超辨十七釋法慧十八釋僧侯十九釋慧彌二十釋道琳二十一釋曇邃未詳何許人少出家止河陰白馬寺蔬食布衣誦正法華經常一日一遍又精達經旨亦為人解説嘗於夜中忽聞扣戶云欲請法師九旬説法邃不許固請乃赴之而猶是眠中比覺己身在白馬塢神祠中并一弟子自爾日日密往餘無知者後寺僧經祠前過見有兩高座邃在北弟子在南如有講説聲又聞有奇香之氣於是道俗共傳咸云神異至夏竟神施以白馬一匹白羊五頭絹九十匹呪願畢於是各絶邃後不知所終釋法相姓梁不測何人常山居精苦誦經十餘萬言鳥獸集其左右皆馴若家禽太山祠有大石函貯財寶相時山行宿于廟側忽見一人玄衣武冠令相開函言絶不見其函石蓋重過千鈞相試提之飄然而起於是取其財以施貧民後度江南止越城寺忽遊縱放蕩優俳滑稽或時裸袒干冒朝貴晉鎮北將軍司馬恬惡其不節招而鴆之頻傾三鍾神氣清夷淡然無擾恬大異之至晉元興末卒春秋八十時有竺曇蓋竺僧法並苦行通感蓋能神呪請雨為楊州刺史司馬元顯所敬法亦善神呪晉丞相會稽王司馬道子為起治城寺焉竺法純未詳何許人少出家止山陰顯義寺苦行有德善誦古維摩經晉元興中為寺上蘭渚買故屋暮還於湖中遇風而船小純唯一心憑觀世音口誦不輟俄見一大流船乘之獲免至岸訪船無主須臾不見道俗咸歎神感後不知所終釋僧生姓袁蜀郡郫人少出家以苦行致稱成都宋豐等請為三賢寺主誦法華習禪定常於山中誦經有虎來蹲其前誦竟乃去後每至諷詠輒見左右四人為侍衛年雖衰老而翹勤彌厲後微疾便語侍者云吾將去矣死後可為燒身弟子依遺命釋法宗臨海人少好遊獵嘗於剡遇射孕鹿母墮胎鹿母銜箭猶就地舐子宗乃悔悟知貪生愛子是有識所同於是摧弓折矢出家業道常分衛自資受一食法蔬苦六時以悔先罪誦法華維摩常升臺諷詠響聞四遠士庶稟其歸戒者三千餘人遂開拓所住以為精舍因誦為目號曰法華臺也宗後不測所終釋道冏姓馬扶風人初出家為道懿弟子懿病嘗遣冏等四人至河南霍山採鍾乳入穴數里跨木渡水三人溺死炬火又亡冏判無濟理冏素誦法華唯憑誠此業又存念觀音有頃見一光如螢火追之不及遂得出穴於是進修禪業節行彌新頻作數過普賢齋並有瑞應或見梵僧入坐或見騎馬人至並未及暄涼倏忽不見後與同學四人南遊上京觀矚風化夜乘氷度河中道氷破三人沒死冏又歸誠觀音乃覺腳下如有一物自𢼨復見赤光在前乘光至岸達都止南澗寺常以般舟為業嘗中夜入禪忽見四人御車至房呼令上乘冏欻不自覺已見身在郡後沈橋見一人在路坐胡床侍者數百人見冏驚起曰坐禪人耳彼人因謂左右曰向止令知處而已何忽勞屈法師於是禮拜執別令人送冏還寺扣門良久方開入寺見房猶閉衆咸莫測其然宋元嘉二十年臨川康王義慶携往廣陵終於彼矣釋慧慶廣陵人出家止廬山寺學通經律清潔有戒行誦法華十地思益維摩每夜吟諷常聞暗中有彈指讚歎之聲嘗於小雷遇風波船將覆沒慶唯誦經不輟覺船在浪中如有人牽之倏忽至岸於是篤厲彌勤宋元嘉末卒春秋六十有二釋普明姓張臨淄人少出家稟性清純蔬食布衣以懺誦為業誦法華維摩二經及誦之時有別衣別座未嘗穢雜每誦至勸發品輒見普賢乘象立在其前誦維摩經亦聞空中唱樂又善神呪所救皆愈有鄉人王道真妻病請明來呪明入門婦便悶絶俄見一物如狸長數尺許從狗竇出因此而愈明嘗行水傍祠巫覡自云神見之皆奔走以宋孝建中卒春秋八十有五釋法莊姓申淮南人十歲出家為廬山慧遠弟子少以苦節標名晚遊關中從睿公稟學元嘉初出都止道場寺性率素止一中而已誦大涅槃法華淨名每後夜諷誦比房常聞莊戶前有如兵仗羽衛之響實天神來聽也宋大明初卒於寺春秋七十有六釋慧果豫州人少以蔬苦自業宋初遊京師止瓦官寺誦法華十地嘗於圊廁見一鬼致敬於果云昔為衆僧作維那小不如法墮在噉糞鬼中法師德素高明又慈悲為意願助以拔濟之方也又云昔有錢三千埋在柿樹下願取以為福果即告衆掘取果得三千為造法華一部并設會後夢見此鬼云已得改生大勝昔日果以宋太始六年卒春秋七十有六釋法恭姓關雍州人初出家止江陵安養寺後出京師住東安寺少而苦行殊倫服布衣餌菽麥誦經三十餘萬言每夜諷詠輒有殊香異氣入恭房者咸共聞之又以弊納聚蚤虱常披以飴之宋武文明三帝及衡陽文王義秀等並崇其德素所獲信施常分給貧病未嘗私蓄宋太始中還西卒於彼春秋八十時烏衣復有僧恭者德業高明綱總寺任亦不食粳糧唯餌豆麥釋僧覆未詳何人少孤為下人所養七歲出家為曇亮弟子學通諸經蔬食持呪誦大品法華宋明帝深加器重敕為彭城寺主率衆有功宋太始末卒春秋六十有六釋慧進姓姚吳興人少而雄勇任性遊俠年四十忽悟心自啓遂爾離俗止京師高座寺蔬食素衣誓誦法華用心勞苦執卷輒病乃發願願造法華百部以悔先障始聚得錢一千六百時有劫來問進有物不答云唯有造經錢在佛處群劫聞之赧然而去於是聚集信施得以成經滿足百部經成之後病亦小差誦法華一部得過情願既滿厲操愈堅常回諸福業願生安養未亡少時忽聞空中聲曰汝所願已足必得生西方也至齊永明三年無病而卒春秋八十有五時京師龍華寺復有釋僧念誦法華金光明蔬食避世釋弘明本姓嬴會稽山陰人少出家貞苦有戒節止山陰雲門寺誦法華習禪定精勤禮懺六時不輟每旦則水瓶自滿實諸天童子以為給使也明嘗於雲門坐禪虎來入明室內伏于床前見明端然不動久久乃去又時見一小兒來聽明誦經明曰汝是何人答云昔是此寺沙彌盜帳下食今墮圊中聞上人道業故來聽誦經願助方便使免斯纍也明即説法勸化領解方隱後於永興石姥巖入定又有山精來惱明明捉得以腰繩繫之鬼遜謝求脫云後不敢復來及解放於是絶迹元嘉中郡守平昌孟顗重其真素要出安止道樹精舍後濟陽江於永興邑立昭玄寺復請明往住大明末陶里董氏又為明於村立柏林寺要明還止訓勗禪戒門人成列以齊永明四年卒於柏林寺春秋八十有四釋慧豫黃龍人來遊京師止靈根寺少而務學遍訪衆師善談論美風則每聞臧否人物輒塞耳不聽或時以異言間止瓶衣率素日以一中自畢精勤標節以救苦為先誦大涅槃法華十地又習禪業精於五門嘗寢見有三人來扣戶並衣冠鮮潔執持華蓋豫問覓誰答云法師應死故來奉迎豫曰小事未了可申一年不答云可爾至明年滿一周而卒是歲齊永明七年春秋五十有七豫同寺有沙門法普亦素行誦經釋道嵩姓夏高密人年十歲出家少而沈隱有志用及具戒之後專好律學誦經三十萬言交接上下未嘗有喜慍之色性好檀捨隨獲利養皆以施人瓶衣之外略無兼物宋元徽中來京師止鍾山定林寺守靖間房懺誦無輟人有造者輒為其説法訓獎以代饌焉從之請戒者甚衆後卒於山中春秋四十有九釋超辨姓張燉煌人幼而神悟孤發履操深沈誦法華金剛波若聞京師盛於佛法乃越自西河路由巴楚達于建業頃之東適吳越觀矚山水停山陰城傍寺少時後還都止定林上寺間居養素畢命山門誦法華日限一遍心敏口從恆有餘力禮千佛凡一百五十餘萬拜足不出門三十餘載以齊永明十年終於山寺春秋七十有三葬于寺南沙門僧祐為造碑墓所東莧劉協製文時有靈根釋法明祇洹釋僧志益州釋法定並誦經十餘萬言蔬苦有至德釋法慧本姓夏侯氏少而秉志精苦律行氷嚴以宋大明之末東遊禹穴隱于天柱山寺誦法華一部蔬食布衣志耽人外居閣不下三十餘年王侯稅駕止拜房而反唯汝南周顒以信解兼深特與相接時有慕德希禮或因顒介意時一見者以齊建武二年卒于山寺春秋八十有五時若耶懸溜山有釋曇遊者亦蔬食誦經苦節為業釋僧侯姓龔西涼州人年十八便蔬食禮懺及具戒之後遊方觀化宋孝建初來至京師誦法華維摩金光明常二日一遍如此六十餘年蕭惠開入蜀請共同遊後惠開協同義嘉負罪歸闕侯乃還都於後岡創立石室以為安禪之所自息慈以來至于捨命魚肉葷辛未嘗近齒腳影小蹉輒虛齋而過齊永明二年微覺不悆至中不能食乃索水漱口合掌而卒春秋八十有九時普弘有釋慧溫亦誦法華經維摩首楞嚴蔬苦並有高節釋慧彌姓楊氏弘農華陰人漢太尉震之後裔也年十六出家及具戒之後志修遠離乃入長安終南山巖谷險絶軌迹莫至彌負錫獨前猛虎肅兕無擾少誦大品又精修三昧於是剪茅結宇以為栖神之宅時至則持鉢入村食竟則還室禪誦如此者八年後聞江東有法之盛乃觀化京師止于鍾山定林寺習業如先為人溫恭沖讓喜慍無色戒範精明獎化忘倦咨賢求善恆若未足凡黑白造山禮拜者皆為説法提誘以代肴饌爰自出家至于衰老葷醪鮮豢一皆永絶足不出戶三十餘年曉夜習定常誦波若六時禮懺必為衆先以梁天監十七年閏八月十五日終於山舍春秋七十有九葬于寺南立碑頌德時定林又有沙門法仙亦誦經有素行後還吳為僧正卒於彼釋道琳本會稽山陰人少出家有戒行善涅槃法華誦淨名經吳國張緒禮事之後居富陽縣泉林寺寺常有鬼怪自琳居之則消琳弟子慧韶為屋所押頭陷入肩琳為祈請韶夜見兩梵道人拔出其頭旦起遂平復琳於是設聖僧齋鋪新帛於床上齋畢見帛上有人迹皆長三尺餘衆咸服其徵感富陽人始家家立聖僧坐以飯之至梁初琳出居齊熙寺天監十八年卒春秋七十有三論曰諷誦之利大矣而成其功者希焉良由總持難得惛忘易生如經所説止復一句一偈亦是聖所稱美是以曇邃通神於石塢僧生感衛於空中道冏臨危而獲濟慧慶將沒而蒙全斯皆實德內充故使徵應外啓經云六牙降室四王衛座豈粵虛哉若乃凝寒靖夜朗月長宵獨處間房吟諷經典音吐遒亮文字分明足使幽靈欣踊精神暢悅所謂歌詠誦法言以此為音樂者也讚曰法身既遠所寄者辭沈吟反復惠利難思無怠三業有競六時化人乃衛變衆來比此焉實德誰與較之
